version: v2
clean: true
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/ohtanakayama/ec-modular-monolith-prototype-go/gen/proto
plugins:
  - remote: buf.build/protocolbuffers/go
    out: ../gen/proto
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: ../gen/proto
    opt:
      - paths=source_relative
      - require_unimplemented_servers=true

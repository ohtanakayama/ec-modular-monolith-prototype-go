services:
  postgres:
    image: postgres:16-alpine
    container_name: ec-modular-go-postgres
    environment:
      POSTGRES_USER: ec_user
      POSTGRES_PASSWORD: ec_pass
      POSTGRES_DB: ec_modular
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ec_user -d ec_modular"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
